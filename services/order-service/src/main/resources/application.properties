spring.application.name=order-service
server.port=${SERVER_PORT:8080}

# --- Postgres (CloudNativePG order-db-cluster) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- NATS / JetStream ---
nats.url=${NATS_URL:nats://nats-srv:4222}

# --- Business rules ---
# Orders are created with expiresAt = now + order.expiry.minutes. The
# external expiration-service consumes order.created, schedules a job, and
# emits order.expired when the time comes. order-service itself has no
# internal scheduler anymore.
order.expiry.minutes=${ORDER_EXPIRY_MINUTES:15}

# --- JWT ---
jwt.key=${JWT_KEY:change-me}
