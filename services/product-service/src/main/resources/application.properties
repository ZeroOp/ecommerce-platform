# Simple Product Service Configuration
server.port=8080

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# NATS
nats.url=${NATS_URL:nats://localhost:4222}

# MinIO / S3 compatible storage
minio.endpoint=${MINIO_ENDPOINT:http://minio-primary-srv:9000}
minio.access-key=${MINIO_ACCESS_KEY:minio}
minio.secret-key=${MINIO_SECRET_KEY:minio123}
minio.bucket=${MINIO_BUCKET:redstore-assets}
minio.brand-logo-prefix=${MINIO_BRAND_LOGO_PREFIX:brand-logos}
minio.category-icon-prefix=${MINIO_CATEGORY_ICON_PREFIX:category-icons}
minio.product-image-prefix=${MINIO_PRODUCT_IMAGE_PREFIX:product-images}
minio.presigned-expiry-minutes=${MINIO_PRESIGNED_EXPIRY_MINUTES:15}