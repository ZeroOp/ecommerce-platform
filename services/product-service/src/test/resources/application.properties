# Test Configuration for Product Service
server.port=0

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration for testing
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
minio.brand-logo-prefix=brand-logos
minio.category-icon-prefix=category-icons
minio.presigned-expiry-minutes=15
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration for testing
JWT_KEY=test-secret-key-for-jwt-token-generation-that-is-long-enough-to-meet-all-requirements-and-security-standards

# Logging
logging.level.com.redstore.common.aspect.RoleValidationAspect=DEBUG
