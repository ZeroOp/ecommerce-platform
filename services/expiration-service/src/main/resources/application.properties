spring.application.name=expiration-service
server.port=${SERVER_PORT:8080}

# --- Postgres (CloudNativePG expiration-db-cluster) ---
# A single table (expiration_jobs) holds scheduled fire-after timestamps
# for orders and deals. We poll it on a short interval instead of using
# Redis delayed queues — simpler ops, crash-safe out of the box, and
# plenty fast for this scale.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expiration_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- NATS / JetStream ---
nats.url=${NATS_URL:nats://nats-srv:4222}
expiration.nats.orders.stream=${EXPIRATION_NATS_ORDERS_STREAM:ORDERS}
expiration.nats.orders.durable=${EXPIRATION_NATS_ORDERS_DURABLE:expiration-orders-created-pull}
expiration.nats.orders.filter-subject=${EXPIRATION_NATS_ORDERS_FILTER:order.created}
expiration.nats.deals.stream=${EXPIRATION_NATS_DEALS_STREAM:DEALS}
expiration.nats.deals.durable=${EXPIRATION_NATS_DEALS_DURABLE:expiration-deals-created-pull}
expiration.nats.deals.filter-subject=${EXPIRATION_NATS_DEALS_FILTER:deal.created}
expiration.nats.fetch-size=${EXPIRATION_NATS_FETCH_SIZE:32}
expiration.nats.fetch-interval-ms=${EXPIRATION_NATS_FETCH_INTERVAL_MS:500}

# --- Scheduler ---
# Polls expiration_jobs every `sweep-interval-ms` and fires any rows whose
# fire_at <= now() (batched up to `max-batch`). Values are intentionally
# conservative; increase `max-batch` if the backlog grows, shorten the
# interval for tighter SLAs.
expiration.sweep-interval-ms=${EXPIRATION_SWEEP_INTERVAL_MS:5000}
expiration.max-batch=${EXPIRATION_MAX_BATCH:200}
