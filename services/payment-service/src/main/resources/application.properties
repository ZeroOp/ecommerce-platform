spring.application.name=payment-service
server.port=${SERVER_PORT:8080}

nats.url=${NATS_URL:nats://nats-srv:4222}

# Same-cluster order API (used to hydrate payment rows if JetStream is slightly behind the UI)
redstore.orders.base-url=${ORDER_SERVICE_URL:http://order-srv:8080}

# Stripe test-mode wiring placeholder (used later for SDK integration)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.public.key=${STRIPE_PUBLIC_KEY:}
stripe.restricted.key=${STRIPE_RESTRICTED_KEY:}

# JWT
jwt.key=${JWT_KEY:change-me}
