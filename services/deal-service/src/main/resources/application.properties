spring.application.name=deal-service
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/deal_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

nats.url=${NATS_URL:nats://nats-srv:4222}
jwt.key=${JWT_KEY:change-me}

# JetStream pull consumers (PRODUCTS + DEALS streams)
deal.nats.catalog.stream=${DEAL_NATS_CATALOG_STREAM:PRODUCTS}
deal.nats.catalog.durable=${DEAL_NATS_CATALOG_DURABLE:deal-service-catalog-sync}
deal.nats.catalog.filter-subject=${DEAL_NATS_CATALOG_FILTER:product.>}
deal.nats.deals.stream=${DEAL_NATS_DEALS_STREAM:DEALS}
deal.nats.deals.durable=${DEAL_NATS_DEALS_DURABLE:deal-service-lifecycle-pull}
deal.nats.deals.filter-subject=${DEAL_NATS_DEALS_FILTER:deal.expired}
deal.nats.fetch-size=${DEAL_NATS_FETCH_SIZE:32}
deal.nats.fetch-interval-ms=${DEAL_NATS_FETCH_INTERVAL_MS:500}
