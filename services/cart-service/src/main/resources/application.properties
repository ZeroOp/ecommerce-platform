server.port=${SERVER_PORT:8084}
spring.application.name=cart-service

# ===============================
# Redis Cluster (Lettuce)
# ===============================
# REDIS_NODES is a comma-separated list of host:port entries (one per pod),
# exactly matching the pattern used by the url-shortener Redis Cluster.
spring.data.redis.cluster.nodes=${REDIS_NODES:cart-redis-0.cart-redis-srv:6379,cart-redis-1.cart-redis-srv:6379,cart-redis-2.cart-redis-srv:6379,cart-redis-3.cart-redis-srv:6379,cart-redis-4.cart-redis-srv:6379,cart-redis-5.cart-redis-srv:6379}
spring.data.redis.cluster.max-redirects=4
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.lettuce.cluster.refresh.period=30s

# ===============================
# Cart behaviour
# ===============================
cart.key-prefix=${CART_KEY_PREFIX:cart:}
cart.ttl-days=${CART_TTL_DAYS:30}
cart.max-items=${CART_MAX_ITEMS:50}

# ===============================
# Inventory service (internal checkout check)
# ===============================
inventory.service.base-url=${INVENTORY_SERVICE_BASE_URL:http://inventory-srv:8080}
inventory.internal.api-key=${INVENTORY_INTERNAL_API_KEY:dev-inventory-internal-key}

# ===============================
# Product catalog replica (Postgres)
# ===============================
# Kept intentionally small; the cart-service only stores a projection of
# what arrives on the PRODUCTS NATS stream so an item can be verified
# before it is added to a user's cart.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cart_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis-cached product projections live under a dedicated prefix so they
# never collide with the per-user cart hashes.
product-cache.key-prefix=${PRODUCT_CACHE_KEY_PREFIX:product:}
product-cache.ttl-seconds=${PRODUCT_CACHE_TTL_SECONDS:900}

# ===============================
# NATS / JetStream
# ===============================
nats.url=${NATS_URL:nats://nats-srv:4222}
cart.nats.stream=${CART_NATS_STREAM:PRODUCTS}
cart.nats.durable=${CART_NATS_DURABLE:cart-products}
cart.nats.filter-subject=${CART_NATS_FILTER_SUBJECT:product.>}
cart.nats.fetch-size=${CART_NATS_FETCH_SIZE:64}
cart.nats.fetch-interval-ms=${CART_NATS_FETCH_INTERVAL_MS:1500}

