server.port=${SERVER_PORT:8083}

spring.application.name=inventory-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventory_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

nats.url=${NATS_URL:nats://localhost:4222}

product.service.base-url=${PRODUCT_SERVICE_BASE_URL:http://localhost:8080}

inventory.internal.api-key=${INVENTORY_INTERNAL_API_KEY:dev-inventory-internal-key}

inventory.cache.key-prefix=${INVENTORY_CACHE_KEY_PREFIX:inv:stock:}
inventory.cache.ttl-seconds=${INVENTORY_CACHE_TTL_SECONDS:60}
