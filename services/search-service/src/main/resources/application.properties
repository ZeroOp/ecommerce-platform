server.port=${SERVER_PORT:8085}
spring.application.name=search-service

# ===============================
# OpenSearch
# ===============================
# Single-node cluster for local dev; use a comma-separated list in prod.
opensearch.host=${OPENSEARCH_HOST:opensearch-srv}
opensearch.port=${OPENSEARCH_PORT:9200}
opensearch.scheme=${OPENSEARCH_SCHEME:http}
opensearch.username=${OPENSEARCH_USERNAME:}
opensearch.password=${OPENSEARCH_PASSWORD:}

# Index that backs the storefront search
search.products.index=${SEARCH_PRODUCTS_INDEX:products}

# ===============================
# NATS / JetStream
# ===============================
nats.url=${NATS_URL:nats://nats-srv:4222}
# Stream + subjects we consume from
search.nats.stream=${SEARCH_NATS_STREAM:PRODUCTS}
search.nats.durable=${SEARCH_NATS_DURABLE:search-products}
search.nats.filter-subject=${SEARCH_NATS_FILTER_SUBJECT:product.>}
search.nats.fetch-size=${SEARCH_NATS_FETCH_SIZE:64}
search.nats.fetch-interval-ms=${SEARCH_NATS_FETCH_INTERVAL_MS:1500}

