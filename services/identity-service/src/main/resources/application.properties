# ===============================
# 1. DATABASE CONFIGURATION
# ===============================
# These match the Env Vars in your identity-depl.yaml
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 2. JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 3. JWT & SECURITY
# ===============================
# Pulls from your identity-secrets
app.jwt.secret=${JWT_KEY}
app.google.client.id=${GOOGLE_CLIENT_ID}

# ===============================
# 4. HEALTH & MONITORING
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ===============================
# 5. REDIS SENTINEL CONFIGURATION
# ===============================
spring.data.redis.sentinel.master=mymaster
spring.data.redis.sentinel.nodes=${REDIS_HOST}:${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# ===============================
# 6. NATS JETSTREAM CONFIGURATION
# ===============================
# Pulls from the NATS_URL injected from identity-secrets
# Defaulting to localhost:4222 for local development
nats.url=${NATS_URL:nats://localhost:4222}