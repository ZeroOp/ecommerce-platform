# Test Database Configuration - Use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Redis Configuration - Use test Redis instance
spring.data.redis.host=localhost
spring.data.redis.port=6370
spring.data.redis.database=1
spring.data.redis.timeout=2000ms
spring.data.redis.client-type=lettuce

# JWT Configuration - Test keys
app.jwt.secret=test-secret-key-for-jwt-in-tests-32-chars-minimum
JWT_KEY=test-secret-key-for-jwt-in-tests-32-chars-minimum

# NATS Configuration - Disable for tests or use test configuration
nats.server.url=nats://localhost:4223
nats.server.subject.prefix=test

# Logging Configuration
logging.level.com.redstore.identity=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Test-specific configurations
spring.test.database.replace=none
spring.jpa.defer-datasource-initialization=true
