<div class="seller-settings">
  <div class="page-header">
    <h1>Settings</h1>
    <p>Manage your account and store preferences</p>
  </div>

  <div class="settings-container">
    <div class="settings-sections">
      <div class="sidebar">
        <div class="sidebar-item active">Profile</div>
        <div class="sidebar-item">Store</div>
        <div class="sidebar-item">Payment</div>
        <div class="sidebar-item">Shipping</div>
        <div class="sidebar-item">Notifications</div>
        <div class="sidebar-item">Security</div>
      </div>

      <div class="settings-content">
        <div class="section">
          <h3>Profile Information</h3>
          <div class="form-group">
            <label>Store Name</label>
            <input type="text" value="Tech Store">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" value="seller@example.com" readonly>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" value="+1 234 567 8900">
          </div>
          <div class="form-group">
            <label>Business Address</label>
            <textarea>123 Business St, Suite 100
New York, NY 10001
United States</textarea>
          </div>
        </div>

        <div class="section">
          <h3>Store Settings</h3>
          <div class="form-group">
            <label>Store Description</label>
            <textarea rows="4">We offer the latest technology products with fast shipping and excellent customer service.</textarea>
          </div>
          <div class="form-group">
            <label>Business Hours</label>
            <input type="text" value="9:00 AM - 6:00 PM EST">
          </div>
          <div class="form-group">
            <label>Return Policy</label>
            <textarea rows="3">30-day return policy for unused items in original packaging.</textarea>
          </div>
        </div>

        <div class="section">
          <h3>Notification Preferences</h3>
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" checked>
              <span>Email notifications for new orders</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" checked>
              <span>Email notifications for customer messages</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox">
              <span>SMS notifications for urgent updates</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" checked>
              <span>Weekly sales reports</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary">Save Changes</button>
      <button class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>
