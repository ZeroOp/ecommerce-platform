<div class="seller-dashboard">
  <header class="seller-header">
    <div class="header-content">
      <div class="logo">
        <h1>RedStore Seller</h1>
      </div>
      <nav class="seller-nav">
        <button class="nav-item" (click)="navigateToProducts()">Products</button>
        <button class="nav-item" (click)="navigateToOrders()">Orders</button>
        <button class="nav-item" (click)="navigateToAnalytics()">Analytics</button>
        <button class="nav-item" (click)="navigateToSettings()">Settings</button>
        <div class="logout-btn" (click)="logout(); $event.preventDefault(); $event.stopPropagation()" style="cursor: pointer; display: inline-block; padding: 8px 16px; background: #dc3545; color: white; border-radius: 4px;">Logout</div>
      </nav>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="welcome-section">
      <h2>Seller Dashboard</h2>
      <p>Manage your products, track orders, and grow your business</p>
    </div>

    <div class="dashboard-stats">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-info">
          <h3>Total Products</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <h3>Total Orders</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <h3>Total Revenue</h3>
          <p class="stat-number">$0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">⭐</div>
        <div class="stat-info">
          <h3>Average Rating</h3>
          <p class="stat-number">0.0</p>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <h3>Quick Actions</h3>
      <div class="action-buttons">
        <button class="action-btn primary" (click)="navigateToProducts()">
          <span>➕</span> Add New Product
        </button>
        <button class="action-btn secondary" (click)="navigateToOrders()">
          <span>📋</span> View Orders
        </button>
      </div>
    </div>
  </main>
</div>
