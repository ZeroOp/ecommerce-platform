<div class="admin-dashboard">
  <header class="admin-header">
    <div class="header-content">
      <div class="logo">
        <h1>RedStore Admin</h1>
      </div>
      <nav class="admin-nav">
        <button class="nav-item" (click)="navigateToUsers()">Users</button>
        <button class="nav-item" (click)="navigateToProducts()">Products</button>
        <button class="nav-item" (click)="navigateToOrders()">Orders</button>
        <button class="nav-item" (click)="navigateToSellers()">Sellers</button>
        <button class="nav-item" (click)="navigateToAnalytics()">Analytics</button>
        <button class="nav-item" (click)="navigateToSettings()">Settings</button>
        <button type="button" class="logout-btn" (click)="handleLogout($event)">Logout</button>
      </nav>
    </div>
  </header>

  <main class="dashboard-content">
    <div class="welcome-section">
      <h2>Admin Dashboard</h2>
      <p>Manage users, products, sellers, and monitor platform analytics</p>
    </div>

    <div class="dashboard-stats">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
          <h3>Total Users</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-info">
          <h3>Total Products</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">🛍</div>
        <div class="stat-info">
          <h3>Total Sellers</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-info">
          <h3>Total Orders</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-info">
          <h3>Total Revenue</h3>
          <p class="stat-number">$0</p>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <h3>Active Sessions</h3>
          <p class="stat-number">0</p>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <h3>Quick Actions</h3>
      <div class="action-buttons">
        <button class="action-btn primary" (click)="navigateToUsers()">
          <span>👤</span> Manage Users
        </button>
        <button class="action-btn secondary" (click)="navigateToProducts()">
          <span>📦</span> Manage Products
        </button>
        <button class="action-btn secondary" (click)="navigateToSellers()">
          <span>🛍</span> Manage Sellers
        </button>
        <button class="action-btn secondary" (click)="navigateToAnalytics()">
          <span>📊</span> View Analytics
        </button>
      </div>
    </div>
  </main>
</div>
