<div class="request-seller-container">
  <div class="request-card">
    <div class="request-header">
      <h1>Request Seller Account</h1>
      <p>Join our marketplace and start selling your products</p>
    </div>

    @if (successMessage) {
      <div class="success-message">
        {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <form class="request-form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input 
            type="text" 
            id="name" 
            [(ngModel)]="formData.name" 
            placeholder="Enter your full name"
            required
          />
        </div>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="formData.email" 
            placeholder="Enter your email address"
            required
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            [(ngModel)]="formData.phone" 
            placeholder="Enter your phone number"
          />
        </div>
        <div class="form-group">
          <label for="businessName">Business Name *</label>
          <input 
            type="text" 
            id="businessName" 
            [(ngModel)]="formData.businessName" 
            placeholder="Enter your business name"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="businessType">Business Type</label>
        <select id="businessType" [(ngModel)]="formData.businessType">
          <option value="">Select business type</option>
          <option value="retail">Retail Store</option>
          <option value="wholesale">Wholesale</option>
          <option value="manufacturer">Manufacturer</option>
          <option value="distributor">Distributor</option>
          <option value="individual">Individual Seller</option>
        </select>
      </div>

      <div class="form-group">
        <label for="businessDescription">Business Description</label>
        <textarea 
          id="businessDescription" 
          [(ngModel)]="formData.businessDescription" 
          placeholder="Describe your business and products you plan to sell"
          rows="4"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="address">Business Address</label>
        <input 
          type="text" 
          id="address" 
          [(ngModel)]="formData.address" 
          placeholder="Enter your business address"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City</label>
          <input 
            type="text" 
            id="city" 
            [(ngModel)]="formData.city" 
            placeholder="Enter city"
          />
        </div>
        <div class="form-group">
          <label for="state">State/Province</label>
          <input 
            type="text" 
            id="state" 
            [(ngModel)]="formData.state" 
            placeholder="Enter state or province"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="postalCode">Postal Code</label>
          <input 
            type="text" 
            id="postalCode" 
            [(ngModel)]="formData.postalCode" 
            placeholder="Enter postal code"
          />
        </div>
        <div class="form-group">
          <label for="country">Country</label>
          <input 
            type="text" 
            id="country" 
            [(ngModel)]="formData.country" 
            placeholder="Enter country"
          />
        </div>
      </div>

      <button 
        type="submit" 
        class="submit-btn" 
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span class="spinner"></span>
        }
        {{ isLoading ? 'Submitting...' : 'Submit Request' }}
      </button>
    </form>

    <div class="request-footer">
      <p>Already have a seller account?</p>
      <button class="link-btn" (click)="navigateToSellerLogin()">
        Sign In
      </button>
      <button class="link-btn" (click)="navigateToUserLogin()">
        User Login
      </button>
    </div>
  </div>
</div>
