<div class="seller-signin-container">
  <div class="signin-card">
    <div class="signin-header">
      <h1>Seller Login</h1>
      <p>Access your seller dashboard</p>
    </div>

    <form class="signin-form" (ngSubmit)="onLoginSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          placeholder="Enter your password"
          required
        />
      </div>

      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <button 
        type="submit" 
        class="signin-btn" 
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span class="spinner"></span>
        }
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="google-signin">
      <div id="google-signin-btn"></div>
    </div>

    <div class="signin-footer">
      <p>Don't have a seller account?</p>
      <button class="link-btn" (click)="requestSellerAccount()">
        Request Seller Account
      </button>
    </div>

    <div class="signin-links">
      <button class="link-btn" (click)="navigateToUserLogin()">
        User Login
      </button>
      <button class="link-btn" (click)="navigateToAdminLogin()">
        Admin Login
      </button>
    </div>
  </div>
</div>
