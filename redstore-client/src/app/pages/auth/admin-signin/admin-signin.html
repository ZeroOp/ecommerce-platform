<div class="admin-signin-container">
  <div class="signin-card">
    <div class="signin-header">
      <h1>Admin Login</h1>
      <p>Restricted access - Google authentication only</p>
    </div>

    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }

    <div class="google-signin">
      <p class="google-instruction">Sign in with your Google account</p>
      <div id="google-signin-btn"></div>
    </div>

    <div class="admin-note">
      <p>Only authorized administrators can access this portal</p>
      <p>Contact support if you need access</p>
    </div>

    <div class="signin-links">
      <button class="link-btn" (click)="navigateToUserLogin()">
        User Login
      </button>
      <button class="link-btn" (click)="navigateToSellerLogin()">
        Seller Login
      </button>
    </div>
  </div>
</div>
