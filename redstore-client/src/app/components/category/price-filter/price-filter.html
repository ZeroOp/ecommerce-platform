<div class="price-filter" *ngIf="priceRanges.length > 0">
  <div class="filter-header">
    <h3 class="filter-title">Shop by Price</h3>
    <div class="filter-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l9.19-1.01L12 2z"/>
      </svg>
    </div>
  </div>
  <div class="price-ranges">
    @for (range of priceRanges; track range.id) {
      <button class="price-range-btn" 
              [class.active]="isActive(range)"
              (click)="selectRange(range)">
        <div class="range-content">
          <div class="range-icon">
            @if (range.max === 9999) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm1 4h-2v-2h2v2zm1 4h-2v-2h2v2z"/>
              </svg>
            } @else if (range.max <= 1000) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l9.19-1.01L12 2z"/>
              </svg>
            } @else if (range.max <= 5000) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2H8v2H6v2H4v2h2v8h2v-2h6v2h2v-2h2v-2h2v2h2v-2h2v-2h2v2h2v2h2v-2h2v2h2v-2h2v2H4v-2z"/>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27L9.19-1.01L12 2z"/>
              </svg>
            }
          </div>
          <div class="range-text">
            <span class="range-label">{{ range.label }}</span>
            @if (range.max === 9999) {
              <span class="range-value">${{ range.min }}+</span>
            } @else {
              <span class="range-value">${{ range.min }} - ${{ range.max }}</span>
            }
          </div>
        </div>
      </button>
    }
  </div>
</div>
