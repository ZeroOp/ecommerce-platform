<div class="brand-section" *ngIf="brands.length > 0">
  <div class="section-header">
    <h2 class="section-title">{{ title }}</h2>
    <button class="view-all-btn" (click)="viewAllBrands()">View All</button>
  </div>
  
  <div class="brands-grid">
    @for (brand of brands; track brand.id) {
      <div class="brand-card" 
           [class.featured]="brand.featured" 
           (click)="navigateToBrand(brand)">
        <div class="brand-logo">
          @if (brand.logo) {
            <img [src]="brand.logo" [alt]="brand.name" class="logo-img">
          } @else {
            <div class="logo-placeholder">{{ brand.name.charAt(0) }}</div>
          }
        </div>
        <div class="brand-name">{{ brand.name }}</div>
        @if (brand.featured) {
          <div class="featured-badge">Featured</div>
        }
      </div>
    }
  </div>
</div>
