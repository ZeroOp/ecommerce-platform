<div class="brand-dialog-overlay" [class.open]="isOpen" (click)="closeDialog()">
  <div class="brand-dialog" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>Register New Brand</h2>
      <button class="close-btn" (click)="closeDialog()">×</button>
    </div>

    <div class="dialog-content">
      <form class="brand-form">
        <div class="form-row">
          <div class="form-group">
            <label for="brandName">Brand Name *</label>
            <input type="text" id="brandName" [(ngModel)]="brandData.name" placeholder="Enter brand name">
          </div>
          
          <div class="form-group">
            <label for="brandWebsite">Website URL *</label>
            <input type="url" id="brandWebsite" [(ngModel)]="brandData.website" placeholder="https://www.example.com">
          </div>
        </div>

        <div class="form-group">
          <label for="brandLogo">Brand Logo *</label>
          <div class="file-upload">
            <input type="file" id="brandLogo" accept="image/*" (change)="onFileSelected($event)" #fileInput>
            <div class="upload-area" [class.has-file]="brandData.logo" (click)="fileInput.click()">
              @if (!brandData.logo) {
                <div class="upload-placeholder">
                  <div class="upload-icon">?</div>
                  <p>Click to upload brand logo</p>
                  <span class="upload-hint">PNG, JPG up to 5MB</span>
                </div>
              } @else {
                <div class="file-preview">
                  <img [src]="createObjectURL(brandData.logo)" [alt]="brandData.name">
                  <button type="button" class="remove-file" (click)="removeLogo(); $event.stopPropagation()">×</button>
                </div>
              }
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="brandDescription">Brand Description</label>
          <textarea id="brandDescription" [(ngModel)]="brandData.description" 
                    placeholder="Describe your brand, products, and values" rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="brandCategory">Category</label>
            <select id="brandCategory" [(ngModel)]="brandData.category">
              <option value="">Select category</option>
              <option value="electronics">Electronics</option>
              <option value="fashion">Fashion & Apparel</option>
              <option value="home">Home & Garden</option>
              <option value="sports">Sports & Outdoors</option>
              <option value="beauty">Beauty & Personal Care</option>
              <option value="toys">Toys & Games</option>
              <option value="books">Books & Media</option>
              <option value="automotive">Automotive</option>
              <option value="food">Food & Beverages</option>
              <option value="health">Health & Wellness</option>
              <option value="other">Other</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="establishedYear">Established Year</label>
            <input type="number" id="establishedYear" [(ngModel)]="brandData.establishedYear" 
                   placeholder="1990" min="1800" max="2024">
          </div>
        </div>

        <div class="form-group">
          <label for="contactEmail">Contact Email *</label>
          <input type="email" id="contactEmail" [(ngModel)]="brandData.contactEmail" 
                 placeholder="brand@example.com">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contactPhone">Contact Phone</label>
            <input type="tel" id="contactPhone" [(ngModel)]="brandData.contactPhone" 
                   placeholder="+1 234 567 8900">
          </div>
          
          <div class="form-group">
            <label for="brandAddress">Business Address</label>
            <input type="text" id="brandAddress" [(ngModel)]="brandData.address" 
                   placeholder="123 Business St, City, State">
          </div>
        </div>
      </form>
    </div>

    <div class="dialog-footer">
      <button type="button" class="btn-secondary" (click)="closeDialog()">Cancel</button>
      <button type="button" class="btn-primary" (click)="submitBrand()" 
              [disabled]="!validateForm()">Register Brand</button>
    </div>
  </div>
</div>
