<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <div class="logo-section">
      <a routerLink="/" class="logo">
        <div class="logo-icon">R</div>
        <span class="logo-text">Red<span class="logo-accent">Store</span></span>
      </a>
    </div>

    <!-- Search Bar -->
    <div class="search-section">
      <div class="search-container">
        <input 
          type="text" 
          class="search-input" 
          placeholder="Search for products..."
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
        >
        <button class="search-btn" (click)="onSearch()">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Navigation Icons -->
    <div class="nav-section">
      <!-- Categories -->
      <div class="nav-item">
        <button class="nav-btn categories-btn">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          <span>Categories</span>
        </button>
      </div>

      <!-- Cart -->
      <div class="nav-item">
        <button class="nav-btn" (click)="navigateToCart()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-badge">0</span>
        </button>
      </div>

      <!-- Profile -->
      <div class="nav-item profile-dropdown" (clickOutside)="closeProfileDropdown()">
        <button class="nav-btn profile-btn" (click)="toggleProfileDropdown()">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
        
        <!-- Dropdown Menu -->
        <div class="dropdown-menu" [class.open]="isProfileDropdownOpen">
          @if (!currentUser) {
            <!-- Not Logged In -->
            <div class="dropdown-item" (click)="navigateToLogin()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
              </svg>
              <span>Sign In</span>
            </div>
            <div class="dropdown-item" (click)="navigateToSignup()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
              <span>Sign Up</span>
            </div>
          } @else {
            <!-- Logged In -->
            <div class="dropdown-header">
              <div class="user-info">
                <div class="user-avatar">{{ currentUser!.email.charAt(0).toUpperCase() }}</div>
                <div class="user-details">
                  <div class="user-email">{{ currentUser!.email }}</div>
                  <div class="user-role">{{ currentUser!.role }}</div>
                </div>
              </div>
            </div>
            
            <div class="dropdown-divider"></div>
            
            <div class="dropdown-item" (click)="navigateToOrders()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              <span>My Orders</span>
            </div>
            
            <div class="dropdown-item" (click)="navigateToWishlist()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
              <span>Wishlist</span>
            </div>
            
            <div class="dropdown-item" (click)="navigateToProfile()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span>Your Profile</span>
            </div>
            
            <div class="dropdown-divider"></div>
            
            <div class="dropdown-item logout" (click)="logout()">
              <svg class="dropdown-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              <span>Logout</span>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</header>
