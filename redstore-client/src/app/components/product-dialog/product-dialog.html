<div class="product-dialog-overlay" [class.open]="isOpen" (click)="closeDialog()">
  <div class="product-dialog" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>Add New Product</h2>
      <button class="close-btn" (click)="closeDialog()">×</button>
    </div>

    <div class="dialog-content">
      <form class="product-form">
        <div class="form-row">
          <div class="form-group">
            <label for="productName">Product Name *</label>
            <input type="text" id="productName" [(ngModel)]="productData.name" placeholder="Enter product name">
          </div>
          
          <div class="form-group">
            <label for="productBrand">Brand *</label>
            <input type="text" id="productBrand" [(ngModel)]="productData.brand" placeholder="Enter brand name">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="productCategory">Category *</label>
            <select id="productCategory" [(ngModel)]="productData.category">
              <option value="">Select category</option>
              <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="productPrice">Price ($) *</label>
            <input type="number" id="productPrice" [(ngModel)]="productData.price" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="productStock">Stock Quantity *</label>
            <input type="number" id="productStock" [(ngModel)]="productData.stock" placeholder="0" min="0">
          </div>
          
          <div class="form-group">
            <label for="productSKU">SKU</label>
            <div class="sku-group">
              <input type="text" id="productSKU" [(ngModel)]="productData.sku" placeholder="AUTO-GENERATED" readonly>
              <button type="button" class="btn-sku" (click)="generateSKU()">Generate</button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="productDescription">Product Description</label>
          <textarea id="productDescription" [(ngModel)]="productData.description" 
                    placeholder="Describe your product features, benefits, and specifications" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label for="productImages">Product Images</label>
          <div class="file-upload">
            <input type="file" id="productImages" multiple accept="image/*" (change)="onFileSelected($event)" #fileInput>
            <div class="upload-area" (click)="fileInput.click()">
              <div class="upload-icon">?</div>
              <p>Click to upload product images</p>
              <span class="upload-hint">PNG, JPG up to 5MB each, max 5 images</span>
            </div>
          </div>
          
          <div class="image-preview-grid">
            <!-- Existing images -->
            <div class="image-preview" *ngFor="let image of productData.images; let i = index">
              <img [src]="createObjectURL(image)" [alt]="'Product image ' + (i + 1)">
              <button type="button" class="remove-image" (click)="removeImage(i)">×</button>
            </div>
            
            <!-- Plus button for adding more images -->
            <div class="add-image-btn" *ngIf="productData.images.length < 5" (click)="fileInput.click()">
              <div class="add-icon">+</div>
              <span>Add Image</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="productTags">Tags</label>
            <input type="text" id="productTags" [(ngModel)]="productData.tags" 
                   placeholder="e.g., wireless, bluetooth, portable">
          </div>
          
          <div class="form-group">
            <label for="productWeight">Weight (kg)</label>
            <input type="number" id="productWeight" [(ngModel)]="productData.weight" placeholder="0.0" step="0.01" min="0">
          </div>
        </div>

        <div class="form-group">
          <label>Dimensions (cm)</label>
          <div class="dimensions-row">
            <input type="number" [(ngModel)]="productData.dimensions.length" placeholder="Length" step="0.1" min="0">
            <span>×</span>
            <input type="number" [(ngModel)]="productData.dimensions.width" placeholder="Width" step="0.1" min="0">
            <span>×</span>
            <input type="number" [(ngModel)]="productData.dimensions.height" placeholder="Height" step="0.1" min="0">
          </div>
        </div>
      </form>
    </div>

    <div class="dialog-footer">
      <button type="button" class="btn-secondary" (click)="closeDialog()">Cancel</button>
      <button type="button" class="btn-primary" (click)="submitProduct()" 
              [disabled]="!validateForm()">Add Product</button>
    </div>
  </div>
</div>
