apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapshot-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapshot
  template:
    metadata:
      labels:
        app: snapshot
    spec:
      containers:
        - name: snapshot
          image: zeroop/redstore-snapshot-service
          env:
            # --- Product DB Credentials ---
            - name: PRODUCT_DB_HOST
              value: "product-db-cluster-rw"
            - name: PRODUCT_DB_USER
              value: "product_admin"
            - name: PRODUCT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db-creds
                  key: password
            - name: PRODUCT_DB_NAME
              value: "product_db"

            # --- Identity DB Credentials ---
            - name: IDENTITY_DB_HOST
              value: "identity-db-cluster-rw"
            - name: IDENTITY_DB_USER
              value: "identity_admin"
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: identity-db-creds
                  key: password
            - name: IDENTITY_DB_NAME
              value: "identity_db"

            # --- MinIO Credentials (Using Internal Service Name) ---
            - name: MINIO_ENDPOINT
              value: "minio-primary-srv"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: secret-key
            - name: MINIO_BUCKET
              value: "redstore-main"
            - name: MINIO_USE_SSL
              value: "false"

            # --- Cart Redis Cluster (for cart snapshots into MinIO) ---
            - name: CART_REDIS_NODES
              valueFrom:
                secretKeyRef:
                  name: cart-redis-secrets
                  key: REDIS_NODES
            - name: CART_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cart-redis-secrets
                  key: REDIS_PASSWORD

            # --- Cart-service Postgres (product-catalog replica) ---
            - name: CART_DB_HOST
              value: "cart-db-cluster-rw"
            - name: CART_DB_USER
              value: "cart_admin"
            - name: CART_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cart-db-creds
                  key: password
            - name: CART_DB_NAME
              value: "cart_db"

            # --- OpenSearch (search-service index) ---
            - name: OPENSEARCH_HOST
              value: "opensearch-srv"
            - name: OPENSEARCH_PORT
              value: "9200"
            - name: OPENSEARCH_SCHEME
              value: "http"
            - name: OPENSEARCH_INDEXES
              value: "products"

            # --- Cron Schedule ---
            # Runs at minute 0 of every 2nd hour.
            - name: SNAPSHOT_CRON_SCHEDULE
              value: "0 */2 * * *"
          # No ports needed as this is a background worker
