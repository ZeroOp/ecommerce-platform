apiVersion: apps/v1
kind: Deployment
metadata:
  name: archiver-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archiver
  template:
    metadata:
      labels:
        app: archiver
    spec:
      containers:
        - name: archiver
          image: zeroop/redstore-archive-service
          env:
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: NATS_URL
            - name: MINIO_ENDPOINT
              value: "http://minio-primary-srv:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: secret-key
            - name: MINIO_BUCKET
              value: "redstore-events"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=20"
          resources:
            requests:
              cpu: "50m"
              memory: "192Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"