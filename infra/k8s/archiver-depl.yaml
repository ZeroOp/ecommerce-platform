apiVersion: apps/v1
kind: Deployment
metadata:
  name: archiver-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: archiver
  template:
    metadata:
      labels:
        app: archiver
    spec:
      containers:
        - name: archiver
          image: zeroop/redstore-archiver-service
          env:
            - name: NATS_URL
              value: "nats://nats-srv:4222"
            - name: MINIO_ENDPOINT
              value: "http://minio-primary-srv:9000"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: secret-key
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"