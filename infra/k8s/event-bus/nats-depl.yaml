# --- 1. HEADLESS SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: nats-srv
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
    - name: cluster
      port: 6222
---
# --- 2. NATS STATEFULSET ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  serviceName: "nats-srv"
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # This part grabs the Pod Name (nats-0, nats-1) to use as a unique Server Name
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - "--js"
            - "--server_name"
            - "$(POD_NAME)"
            - "--cluster_name"
            - "REDSTORE_NATS"
            - "--cluster"
            - "nats://0.0.0.0:6222"
            - "--routes"
            - "nats://nats-0.nats-srv:6222,nats://nats-1.nats-srv:6222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 6222
              name: cluster
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
---
# --- 3. JETSTREAM STREAM SETUP JOB ---
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-stream-setup
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: nats-setup
      spec:
        restartPolicy: OnFailure
        containers:
          - name: nats-setup
            image: natsio/nats-box:0.19.3
            command:
              - "sh"
              - "-c"
              - |
                echo "Waiting for NATS cluster to be ready..."
                until nats server check connection --server nats://nats-srv:4222; do
                  echo "NATS not ready yet, retrying in 3s..."
                  sleep 3
                done
                echo "NATS is ready. Creating JetStreamStreams..."

                nats stream add IDENTITY \
                  --server nats://nats-srv:4222 \
                  --subjects "identity.>" \
                  --retention limits \
                  --max-msgs -1 \
                  --max-bytes -1 \
                  --max-age 72h \
                  --storage file \
                  --replicas 2 \
                  --discard old \
                  --defaults \
                || echo "Identity stream may already exists , skipping..."

                nats stream add PRODUCTS \
                  --server nats://nats-srv:4222 \
                  --subjects "products.>" \
                  --retention limits \
                  --max-msgs -1 \
                  --max-bytes -1 \
                  --max-age 72h \
                  --storage file \
                  --replicas 2 \
                  --discard old \
                  --defaults \
                || echo "Products stream may already exists , skipping..."

                nats stream add ORDERS \
                  --server nats://nats-srv:4222 \
                  --subjects "orders.>, payment.>" \
                  --retention limits \
                  --max-msgs -1 \
                  --max-bytes -1 \
                  --max-age 72h \
                  --storage file \
                  --replicas 2 \
                  --discard old \
                  --defaults \
                || echo "Orders stream may already exists , skipping..."