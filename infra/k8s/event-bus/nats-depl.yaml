# --- 1. HEADLESS SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: nats-srv
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
    - name: cluster
      port: 6222
---
# --- 2. NATS STATEFULSET ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
spec:
  serviceName: "nats-srv"
  replicas: 3
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          # This part grabs the Pod Name (nats-0, nats-1) to use as a unique Server Name
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args:
            - "--js"
            - "--server_name"
            - "$(POD_NAME)"
            - "--cluster_name"
            - "REDSTORE_NATS"
            - "--cluster"
            - "nats://0.0.0.0:6222"
            - "--routes"
            - "nats://nats-0.nats-srv:6222,nats://nats-1.nats-srv:6222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 6222
              name: cluster
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"