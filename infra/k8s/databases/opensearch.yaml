# ------------------------------------------------------------------
# OpenSearch — single node for local dev.
#
# Pairs with services/search-service, which subscribes to NATS product.*
# events and indexes them here. The StatefulSet uses an emptyDir so the
# cluster is disposable; snapshot-service scrolls the index into MinIO on
# a schedule and will be used as the restore point.
# ------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: opensearch-srv
spec:
  clusterIP: None
  selector:
    app: opensearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
spec:
  serviceName: opensearch-srv
  replicas: 1
  selector:
    matchLabels:
      app: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      # sysctls required by OpenSearch; skip if the node doesn't allow them.
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/opensearch/data"]
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          securityContext:
            runAsUser: 0
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.11.1
          env:
            - name: cluster.name
              value: "redstore-search"
            - name: node.name
              value: "opensearch-0"
            - name: discovery.type
              value: "single-node"
            - name: bootstrap.memory_lock
              value: "false"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 90
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
      volumes:
        - name: data
          emptyDir: {}
