apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-srv
spec:
  ports:
    - port: 6379
      name: redis
    - port: 26379
      name: sentinel
  clusterIP: None
  selector:
    app: redis-sentinel
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
spec:
  serviceName: "redis-sentinel-srv"
  replicas: 3
  selector:
    matchLabels:
      app: redis-sentinel
  template:
    metadata:
      labels:
        app: redis-sentinel
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "250m"
              memory: "250Mi"
          command:
            - "sh"
            - "-c"
            - |
              if [ "$(hostname)" = "redis-sentinel-0" ]; then
                redis-server
              else
                # Fallback to Node 0 if we can't find who the master is
                redis-server --replicaof redis-sentinel-0.redis-sentinel-srv 6379
              fi

        - name: sentinel
          image: redis:7-alpine
          ports:
            - containerPort: 26379
          resources:
            requests:
              cpu: "50m"
              memory: "50Mi"
            limits:
              cpu: "100m"
              memory: "100Mi"
          command:
            - "sh"
            - "-c"
            - |
              echo "Waiting for base node to respond..."
              # Loop to wait until Node 0 is reachable
              until ping -c 1 redis-sentinel-0.redis-sentinel-srv > /dev/null 2>&1; do
                sleep 2
              done
              
              # Extract the actual IP address so Sentinel doesn't fail on hostname resolution
              # Busybox/Alpine 'nslookup' returns lines like 'Address: 10.x.x.x'
              MASTER_IP=$(nslookup redis-sentinel-0.redis-sentinel-srv | awk '/^Address: / { print $2 }' | head -n1)
              
              # Fallback to hostname if IP extraction somehow yields nothing
              if [ -z "$MASTER_IP" ]; then
                MASTER_IP="redis-sentinel-0.redis-sentinel-srv"
              fi
              
              echo "Resolved Master IP: $MASTER_IP"
              
              # 📝 Generate clean config targeting that resolved IP
              echo "port 26379" > /tmp/sentinel.conf
              echo "sentinel monitor mymaster $MASTER_IP 6379 2" >> /tmp/sentinel.conf
              echo "sentinel down-after-milliseconds mymaster 5000" >> /tmp/sentinel.conf
              echo "sentinel failover-timeout mymaster 60000" >> /tmp/sentinel.conf
              echo "sentinel parallel-syncs mymaster 1" >> /tmp/sentinel.conf
              
              redis-sentinel /tmp/sentinel.conf